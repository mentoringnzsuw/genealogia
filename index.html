<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drzewo mentoringowe NZS OU UW</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://d3js.org/d3-dsv.v2.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Additional styles for the logo positioning */
        .logo-container {
            position: absolute;
            top: 0;
            left: 20px; /* Match the container's left padding */
            z-index: 5; /* Lower z-index so text appears above */
        }
        
        .logo-container img {
            height: 100px; /* Increased logo height */
            width: auto; /* Maintain aspect ratio */
            display: block;
        }

        .logo-container svg {
            height: 100px; /* Increased logo height */
            width: auto;
            aspect-ratio: 200 / 179; /* Match logo.png proportions */
            display: block;
        }
        
        .top-bar .container {
            margin-left: 125px; /* Make space for the logo - adjusted for larger width */
            position: relative;
            z-index: 10; /* Higher z-index for text content */
            display: flex;
            align-items: center; /* Vertically center items */
            min-height: 40px; /* Ensure minimum height for content */
        }
        
        /* Make sure text is always above logo */
        .site-title, .control-buttons {
            position: relative;
            z-index: 10;
        }
        
        /* Ensure vertical centering */
        .control-buttons {
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>
    <!-- Top Gradient Bar -->
    <header class="top-bar">
        <!-- Logo in absolute position -->
        <div class="logo-container">
            <svg
                class="logo-svg"
                xmlns="http://www.w3.org/2000/svg"
                xmlns:xlink="http://www.w3.org/1999/xlink"
                width="112"
                height="100"
                viewBox="0 0 200 179"
                aria-label="logo NZS OU UW"
                role="img"
                preserveAspectRatio="xMidYMid meet"
            >
                <defs>
                    <!-- Outline only the bright/white parts (the shield), not the dark text -->
                    <filter id="white-shield-outline" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
                        <feColorMatrix in="SourceGraphic" type="saturate" values="0" result="gray" />
                        <!-- Boost highlights so only near-white survives thresholding -->
                        <feComponentTransfer in="gray" result="boost">
                            <feFuncR type="linear" slope="10" intercept="-8" />
                            <feFuncG type="linear" slope="10" intercept="-8" />
                            <feFuncB type="linear" slope="10" intercept="-8" />
                            <feFuncA type="identity" />
                        </feComponentTransfer>
                        <!-- Binary mask from boosted luminance -->
                        <feComponentTransfer in="boost" result="mask">
                            <feFuncR type="discrete" tableValues="0 1" />
                            <feFuncG type="discrete" tableValues="0 1" />
                            <feFuncB type="discrete" tableValues="0 1" />
                            <feFuncA type="discrete" tableValues="0 1" />
                        </feComponentTransfer>
                        <feMorphology in="mask" operator="dilate" radius="2" result="dilated" />
                        <feComposite in="dilated" in2="mask" operator="out" result="ring" />
                        <feFlood flood-color="#000" result="outlineColor" />
                        <feComposite in="outlineColor" in2="ring" operator="in" result="outline" />
                        <feMerge>
                            <feMergeNode in="outline" />
                            <feMergeNode in="SourceGraphic" />
                        </feMerge>
                    </filter>
                </defs>

                <image href="logo.png" xlink:href="logo.png" x="0" y="0" width="200" height="179" />
            </svg>
        </div>
        
        <div class="container" id="navbarcontainer">
            <!-- Site Title -->
            <h1 class="site-title">Drzewo mentoringowe NZS OU UW</h1>
            
            <!-- Control Buttons -->
            <div class="control-buttons">
                <button id="center-button" class="control-button">Wyśrodkuj</button>
                <button id="ancestry-button" class="control-button">Pokrewieństwo</button>
                <button id="search-button" class="control-button">Znajdź NZSiaka</button>
            </div>
        </div>
    </header>
    
    <!-- Main Visualization Container -->
    <main id="chart-container">
        <div id="status-message"></div>
        <!-- SVG will be appended here -->
    </main>
    
    <!-- Search Dialog -->
    <div id="search-dialog" class="dialog-overlay">
        <div class="dialog-content">
            <div class="dialog-header">
                <h2>Znajdź NZSiaka</h2>
                <button id="close-dialog" class="close-button">&times;</button>
            </div>
            <div class="dialog-body">
                <div class="search-wrapper">
                    <input type="text" id="search-input" placeholder="Wpisz imię lub nazwisko...">
                </div>
                <div id="search-results"></div>
            </div>
        </div>
    </div>
    
    <!-- Ancestry Search Dialog -->
    <div id="ancestry-dialog" class="dialog-overlay">
        <div class="dialog-content">
            <div class="dialog-header">
                <h2>Znajdź wspólnego przodka</h2>
                <button id="close-ancestry-dialog" class="close-button">&times;</button>
            </div>
            <div class="dialog-body">
                <div class="ancestry-search">
                    <label>Pierwsza osoba</label>
                    <div class="search-wrapper">
                        <input type="text" id="person1-input" placeholder="Wpisz imię lub nazwisko...">
                    </div>
                    <div id="person1-results" class="ancestry-results"></div>
                    
                    <div class="selected-person" id="selected-person1">
                        <span class="person-name"></span>
                        <button class="clear-selection">&times;</button>
                    </div>
                    
                    <div class="separator"></div>
                    
                    <label>Druga osoba</label>
                    <div class="search-wrapper">
                        <input type="text" id="person2-input" placeholder="Wpisz imię lub nazwisko...">
                    </div>
                    <div id="person2-results" class="ancestry-results"></div>
                    
                    <div class="selected-person" id="selected-person2">
                        <span class="person-name"></span>
                        <button class="clear-selection">&times;</button>
                    </div>
                </div>
                
                <button id="find-ancestor-btn" class="find-button" disabled>Szukaj</button>
            </div>
        </div>
    </div>
    
    <script src="enhanced-tree-graph.js"></script>
    <script src="app.js"></script>
</body>
</html>
